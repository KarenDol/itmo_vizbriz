<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleep Study Data Extractor - O2 < 90% Testing</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 300;
        }
        
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }
        
        .input-section {
            margin-bottom: 30px;
        }
        
        .input-section label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
        }
        
        textarea {
            width: 100%;
            min-height: 200px;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            resize: vertical;
            transition: border-color 0.3s ease;
        }
        
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .patient-input {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .patient-input input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s ease;
        }
        
        .patient-input input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .button-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            min-width: 160px;
        }
        
        .btn-primary {
            background: #52c41a;
            color: white;
        }
        
        .btn-primary:hover {
            background: #45b516;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: #667eea;
            color: white;
        }
        
        .btn-secondary:hover {
            background: #5a6fd8;
            transform: translateY(-2px);
        }
        
        .btn-info {
            background: #1890ff;
            color: white;
        }
        
        .btn-info:hover {
            background: #1479e6;
            transform: translateY(-2px);
        }
        
        .btn-warning {
            background: #faad14;
            color: white;
        }
        
        .btn-warning:hover {
            background: #e89c0c;
            transform: translateY(-2px);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        
        .results-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-top: 30px;
            border-left: 4px solid #667eea;
        }
        
        .results-section h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .result-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #e1e5e9;
        }
        
        .result-item.success {
            border-left: 4px solid #52c41a;
        }
        
        .result-item.error {
            border-left: 4px solid #ff4d4f;
        }
        
        .result-value {
            font-weight: bold;
            color: #667eea;
            font-size: 1.2em;
        }
        
        .pattern-result {
            font-family: 'Courier New', monospace;
            font-size: 12px;
            background: #f5f5f5;
            padding: 8px;
            border-radius: 4px;
            margin-top: 8px;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
        
        .success-message {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            color: #52c41a;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
        
        .tabs {
            display: flex;
            border-bottom: 2px solid #e1e5e9;
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 12px 24px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 16px;
            color: #666;
            border-bottom: 2px solid transparent;
            transition: all 0.3s ease;
        }
        
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .document-test-section {
            background: #f0f2f5;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .document-inputs {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .document-inputs input, .document-inputs select {
            padding: 10px;
            border: 1px solid #d9d9d9;
            border-radius: 6px;
            font-size: 14px;
        }
        
        .file-upload-section {
            border: 2px dashed #d9d9d9;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
            transition: border-color 0.3s ease;
        }
        
        .file-upload-section:hover {
            border-color: #667eea;
        }
        
        .file-upload-section input[type="file"] {
            width: 100%;
            padding: 10px;
            border: none;
            background: transparent;
            cursor: pointer;
        }
        
        .file-info {
            background: #f0f2f5;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            text-align: left;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .metric-category {
            background: white;
            border: 1px solid #e1e5e9;
            border-radius: 8px;
            padding: 15px;
        }
        
        .metric-category h4 {
            color: #667eea;
            margin-bottom: 10px;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 5px;
        }
        
        .metric-item {
            background: #f8f9fa;
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 4px;
            border-left: 3px solid #52c41a;
        }
        
        .metric-value {
            font-weight: bold;
            color: #1890ff;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            .button-row {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                margin-bottom: 10px;
            }
            
            .document-inputs {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Sleep Study Data Extractor</h1>
        <p class="subtitle">Test and refine O2 < 90% extraction until we get it right</p>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('text-testing')">Text Testing</button>
            <button class="tab" onclick="switchTab('file-upload')">File Upload</button>
            <button class="tab" onclick="switchTab('patient-testing')">Patient Testing</button>
            <button class="tab" onclick="switchTab('document-testing')">Document Testing</button>
        </div>
        
        <!-- Text Testing Tab -->
        <div id="text-testing" class="tab-content active">
            <div class="input-section">
                <label for="reportText">Paste your sleep study report text here:</label>
                <textarea id="reportText" placeholder="Enter sleep study report text..."></textarea>
            </div>
            
            <div class="button-row">
                <button class="btn btn-primary" onclick="loadSampleReport()">Load Sample Report</button>
                <button class="btn btn-secondary" onclick="testRegexPatterns()">Test Regex Patterns</button>
                <button class="btn btn-info" onclick="simulateLLMExtraction()">LLM Document Analysis</button>
                <button class="btn btn-warning" onclick="extractAllMetrics()">Extract All Metrics</button>
            </div>
        </div>
        
        <!-- File Upload Tab -->
        <div id="file-upload" class="tab-content">
            <div class="input-section">
                <label for="fileUpload">Upload a sleep study document:</label>
                <div class="file-upload-section">
                    <input type="file" id="fileUpload" accept=".pdf,.txt,.doc,.docx,.jpg,.jpeg,.png,.tiff,.tif,.bmp" onchange="handleFileSelect(event)">
                    <small style="color: #666; display: block; margin-top: 8px;">
                        📄 Supports: PDF, Word, Text files<br>
                        🖼️ Images: JPG, PNG, TIFF, BMP (with OCR)
                    </small>
                    <div class="file-info" id="fileInfo" style="display: none;">
                        <strong>Selected file:</strong> <span id="fileName"></span>
                        <br><strong>Size:</strong> <span id="fileSize"></span>
                        <br><strong>Type:</strong> <span id="fileType"></span>
                    </div>
                </div>
            </div>
            
            <div class="button-row">
                <button class="btn btn-success" onclick="directFileToLLM()" disabled id="directFileBtn">🚀 Direct File → LLM (Pure Claude)</button>
                <button class="btn btn-primary" onclick="uploadAndExtract()" disabled id="uploadBtn">Upload & Extract Content</button>
                <button class="btn btn-secondary" onclick="runRegexOnFile()" disabled id="regexBtn">Run Regex Tests</button>
                <button class="btn btn-info" onclick="runLLMOnFile()" disabled id="llmBtn">LLM Document Analysis</button>
                <button class="btn btn-warning" onclick="extractAllMetricsFromFile()" disabled id="extractAllBtn">Extract All Metrics</button>
                <button class="btn btn-success" onclick="runDirectLLMAnalysis()" disabled id="directLLMBtn">🤖 Direct LLM (Claude-like)</button>
            </div>
        </div>
        
        <!-- Patient Testing Tab -->
        <div id="patient-testing" class="tab-content">
            <div class="input-section">
                <label for="patientId">Patient ID for full extraction test:</label>
                <div class="patient-input">
                    <input type="number" id="patientId" placeholder="Enter patient ID (e.g., 46351)">
                    <button class="btn btn-warning" onclick="runFullTest()">Run All Tests</button>
                </div>
            </div>
        </div>
        
        <!-- Document Testing Tab -->
        <div id="document-testing" class="tab-content">
            <div class="document-test-section">
                <h3>Test Document Extraction from S3</h3>
                <div class="document-inputs">
                    <input type="text" id="s3Key" placeholder="S3 Key (e.g., path/to/document.pdf)">
                    <select id="fileType">
                        <option value="application/pdf">PDF</option>
                        <option value="image/jpeg">JPEG</option>
                        <option value="image/png">PNG</option>
                        <option value="text/plain">Text</option>
                        <option value="application/vnd.openxmlformats-officedocument.wordprocessingml.document">Word Doc</option>
                    </select>
                    <input type="text" id="fileName" placeholder="File Name">
                </div>
                <button class="btn btn-info" onclick="testDocumentExtraction()">Extract Document</button>
            </div>
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Processing...</p>
        </div>
        
        <div id="results" class="results-section" style="display: none;">
            <h3>Results</h3>
            <div id="resultsContent"></div>
        </div>
    </div>

    <script>
        function switchTab(tabName) {
            // Hide all tab contents
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });
            
            // Remove active class from all tabs
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            // Show selected tab content
            document.getElementById(tabName).classList.add('active');
            
            // Add active class to clicked tab
            event.target.classList.add('active');
        }
        
        function showLoading() {
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';
        }
        
        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }
        
        function showResults(content) {
            document.getElementById('resultsContent').innerHTML = content;
            document.getElementById('results').style.display = 'block';
        }
        
        function showError(message) {
            showResults(`<div class="error-message">Error: ${message}</div>`);
        }
        
        function loadSampleReport() {
            showLoading();
            
            fetch('/o2-extraction/load-sample', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                }
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.success) {
                    document.getElementById('reportText').value = data.sample_text;
                    showResults('<div class="success-message">Sample report loaded successfully!</div>');
                } else {
                    showError(data.error || 'Failed to load sample report');
                }
            })
            .catch(error => {
                hideLoading();
                showError('Network error: ' + error.message);
            });
        }
        
        function testRegexPatterns() {
            const text = document.getElementById('reportText').value.trim();
            if (!text) {
                showError('Please enter some text to test');
                return;
            }
            
            showLoading();
            
            fetch('/o2-extraction/test-regex', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ text: text })
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.success) {
                    let html = '<h4>Regex Pattern Test Results</h4>';
                    
                    if (data.normalized_text !== text) {
                        html += `<div class="result-item">
                            <strong>Text Normalization:</strong> Applied character replacements
                        </div>`;
                    }
                    
                    data.results.forEach(result => {
                        const className = result.found ? 'success' : '';
                        html += `<div class="result-item ${className}">
                            <strong>${result.description}</strong><br>
                            <div class="pattern-result">Pattern: ${result.pattern}</div>
                            ${result.found ? 
                                `<div class="result-value">Found: ${result.matches.join(', ')}</div>` : 
                                '<div>No matches found</div>'
                            }
                        </div>`;
                    });
                    
                    showResults(html);
                } else {
                    showError(data.error || 'Failed to test regex patterns');
                }
            })
            .catch(error => {
                hideLoading();
                showError('Network error: ' + error.message);
            });
        }
        
        function simulateLLMExtraction() {
            const text = document.getElementById('reportText').value.trim();
            if (!text) {
                showError('Please enter some text to test');
                return;
            }
            
            showLoading();
            
            fetch('/o2-extraction/simulate-llm', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ text: text })
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.success) {
                    let html = '<h4>LLM Extraction Results</h4>';
                    
                    Object.entries(data.extraction_results).forEach(([method, result]) => {
                        const className = result.success ? 'success' : 'error';
                        html += `<div class="result-item ${className}">
                            <strong>${result.method}</strong><br>
                            ${result.success ? 
                                `<div class="result-value">Extracted Value: ${result.value}%</div>` : 
                                `<div>Failed: ${result.error || 'No value extracted'}</div>`
                            }
                        </div>`;
                    });
                    
                    showResults(html);
                } else {
                    showError(data.error || 'Failed to simulate LLM extraction');
                }
            })
            .catch(error => {
                hideLoading();
                showError('Network error: ' + error.message);
            });
        }
        
        function runFullTest() {
            const patientId = document.getElementById('patientId').value.trim();
            if (!patientId) {
                showError('Please enter a patient ID');
                return;
            }
            
            showLoading();
            
            fetch('/o2-extraction/run-full-test', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ patient_id: patientId })
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.success) {
                    let html = '<h4>Full Patient Extraction Results</h4>';
                    html += `<div class="result-item success">
                        <strong>Patient ID:</strong> ${data.result.patient_id}<br>
                        <strong>Documents Processed:</strong> ${data.result.added}<br>
                        <div class="success-message">Extraction completed successfully!</div>
                    </div>`;
                    
                    showResults(html);
                } else {
                    showError(data.error || 'Failed to run full test');
                }
            })
            .catch(error => {
                hideLoading();
                showError('Network error: ' + error.message);
            });
        }
        
        function testDocumentExtraction() {
            const s3Key = document.getElementById('s3Key').value.trim();
            const fileType = document.getElementById('fileType').value;
            const fileName = document.getElementById('fileName').value.trim() || 'test_document';
            
            if (!s3Key) {
                showError('Please enter an S3 key');
                return;
            }
            
            showLoading();
            
            fetch('/o2-extraction/test-document-extraction', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ 
                    s3_key: s3Key,
                    file_type: fileType,
                    file_name: fileName
                })
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.success) {
                    let html = '<h4>Document Extraction Results</h4>';
                    html += `<div class="result-item success">
                        <strong>Content Length:</strong> ${data.content_length} characters<br>
                        <strong>Raw Content (first 2000 chars):</strong><br>
                        <div class="pattern-result">${data.raw_content}</div>
                        <strong>Normalized Content (first 2000 chars):</strong><br>
                        <div class="pattern-result">${data.normalized_content}</div>
                    </div>`;
                    
                    showResults(html);
                    
                    // Auto-populate the text area with normalized content
                    document.getElementById('reportText').value = data.normalized_content;
                    
                } else {
                    showError(data.error || 'Failed to extract document');
                }
            })
            .catch(error => {
                hideLoading();
                showError('Network error: ' + error.message);
            });
        }
        
        // Global variable to store extracted content
        let extractedContent = '';
        let currentFileName = '';
        
        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (file) {
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('fileSize').textContent = formatFileSize(file.size);
                document.getElementById('fileType').textContent = file.type || 'Unknown';
                document.getElementById('fileInfo').style.display = 'block';
                
                // Enable buttons
                document.getElementById('uploadBtn').disabled = false;
                document.getElementById('directFileBtn').disabled = false;  // Enable direct file → LLM
                
                currentFileName = file.name;
            }
        }
        
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        function directFileToLLM() {
            const fileInput = document.getElementById('fileUpload');
            const file = fileInput.files[0];
            
            if (!file) {
                showError('Please select a file first');
                return;
            }
            
            showLoading();
            
            const formData = new FormData();
            formData.append('file', file);
            
            fetch('/o2-extraction/direct-llm-file', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.success) {
                    const timePoints = data.extracted_data;
                    const totalMetrics = data.metrics_found;
                    
                    let html = `
                    <div class="result-section">
                        <h3>🚀 Direct File → LLM Results (Temporal Data)</h3>
                        <div class="success-message">Found ${timePoints.length} time points with ${totalMetrics} total metrics! (File size: ${(data.file_size/1000).toFixed(1)}k chars)</div>`;
                    
                    // Display each time point
                    timePoints.forEach((timePoint, index) => {
                        const metricsInPoint = Object.values(timePoint).filter(v => v !== null && v !== timePoint.date && v !== timePoint.study_type).length;
                        
                        html += `
                        <div class="time-point-section" style="margin: 20px 0; border: 2px solid #e5e7eb; border-radius: 10px; padding: 15px;">
                            <h4 style="color: #1f2937; margin: 0 0 15px 0;">
                                📅 ${timePoint.date || 'Unknown Date'} 
                                <span style="font-size: 14px; color: #6b7280;">(${timePoint.study_type || 'unknown'}) - ${metricsInPoint} metrics</span>
                            </h4>
                            <div class="metrics-grid">`;
                        
                        // Display metrics for this time point
                        for (const [key, value] of Object.entries(timePoint)) {
                            if (value !== null && key !== 'date' && key !== 'study_type') {
                                const displayKey = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                                html += `
                                    <div class="metric-card">
                                        <div class="metric-name">${displayKey}</div>
                                        <div class="metric-value">${value}</div>
                                    </div>`;
                            }
                        }
                        
                        html += `</div></div>`;
                    });
                    
                    html += `
                        <div class="raw-response">
                            <h4>Raw LLM Response:</h4>
                            <pre>${data.raw_llm_response}</pre>
                        </div>
                    </div>`;
                    
                    showResults(html);
                } else {
                    showError(data.error || 'Direct file to LLM analysis failed');
                    if (data.raw_llm_response) {
                        showError('Raw LLM Response: ' + data.raw_llm_response);
                    }
                }
            })
            .catch(error => {
                hideLoading();
                showError('Network error: ' + error.message);
            });
        }
        
        function uploadAndExtract() {
            const fileInput = document.getElementById('fileUpload');
            const file = fileInput.files[0];
            
            if (!file) {
                showError('Please select a file first');
                return;
            }
            
            showLoading();
            
            const formData = new FormData();
            formData.append('file', file);
            
            fetch('/o2-extraction/upload-file', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.success) {
                    extractedContent = data.full_normalized_content;
                    currentFileName = data.filename;
                    
                    // Enable other buttons now that we have content
                    document.getElementById('regexBtn').disabled = false;
                    document.getElementById('llmBtn').disabled = false;
                    document.getElementById('extractAllBtn').disabled = false;
                    document.getElementById('directLLMBtn').disabled = false;
                    
                    // Auto-populate the text area with extracted content
                    document.getElementById('reportText').value = extractedContent;
                    
                    let html = '<h4>File Upload Results</h4>';
                    html += `<div class="result-item success">
                        <strong>File:</strong> ${data.filename}<br>
                        <strong>Content Length:</strong> ${data.content_length} characters<br>
                        <strong>Raw Content (first 2000 chars):</strong><br>
                        <div class="pattern-result">${data.raw_content}</div>
                        <strong>Normalized Content (first 2000 chars):</strong><br>
                        <div class="pattern-result">${data.normalized_content}</div>
                        <div class="success-message">Content extracted successfully! You can now run tests on this content.</div>
                    </div>`;
                    
                    showResults(html);
                } else {
                    showError(data.error || 'Failed to upload and extract file');
                }
            })
            .catch(error => {
                hideLoading();
                showError('Network error: ' + error.message);
            });
        }
        
        function runRegexOnFile() {
            if (!extractedContent) {
                showError('Please upload and extract a file first');
                return;
            }
            
            showLoading();
            
            fetch('/o2-extraction/test-regex', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ text: extractedContent })
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.success) {
                    let html = `<h4>Regex Pattern Test Results for ${currentFileName}</h4>`;
                    
                    data.results.forEach(result => {
                        const className = result.found ? 'success' : '';
                        html += `<div class="result-item ${className}">
                            <strong>${result.description}</strong><br>
                            <div class="pattern-result">Pattern: ${result.pattern}</div>
                            ${result.found ? 
                                `<div class="result-value">Found: ${result.matches.join(', ')}</div>` : 
                                '<div>No matches found</div>'
                            }
                        </div>`;
                    });
                    
                    showResults(html);
                } else {
                    showError(data.error || 'Failed to test regex patterns');
                }
            })
            .catch(error => {
                hideLoading();
                showError('Network error: ' + error.message);
            });
        }
        
        function runLLMOnFile() {
            if (!extractedContent) {
                showError('Please upload and extract a file first');
                return;
            }
            
            showLoading();
            
            fetch('/o2-extraction/simulate-llm', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ 
                    text: extractedContent,
                    filename: currentFileName 
                })
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.success) {
                    displayComprehensiveLLMResults(data);
                } else {
                    showError(data.error || 'Failed to run LLM analysis');
                }
            })
            .catch(error => {
                hideLoading();
                showError('Network error: ' + error.message);
            });
        }
        
        function simulateLLMExtraction() {
            const text = document.getElementById('reportText').value.trim();
            if (!text) {
                showError('Please enter some text to test');
                return;
            }
            
            showLoading();
            
            fetch('/o2-extraction/simulate-llm', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ 
                    text: text,
                    filename: 'manual_text_input'
                })
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.success) {
                    displayComprehensiveLLMResults(data);
                } else {
                    showError(data.error || 'Failed to run LLM analysis');
                }
            })
            .catch(error => {
                hideLoading();
                showError('Network error: ' + error.message);
            });
        }
        
        function displayComprehensiveLLMResults(data) {
            const analysis = data.analysis_result;
            let html = `<h4>Comprehensive LLM Analysis Results</h4>`;
            
            if (analysis.success && analysis.extracted_metrics) {
                const metrics = analysis.extracted_metrics;
                
                html += '<div class="metrics-grid">';
                
                // Patient Demographics
                if (metrics.patient_demographics) {
                    html += createMetricSection('Patient Demographics', metrics.patient_demographics);
                }
                
                // Sleep Metrics
                if (metrics.sleep_metrics) {
                    html += createMetricSection('Sleep Metrics', metrics.sleep_metrics);
                }
                
                // Oxygen Metrics
                if (metrics.oxygen_metrics) {
                    html += createMetricSection('Oxygen Metrics', metrics.oxygen_metrics);
                }
                
                // Sleep Architecture
                if (metrics.sleep_architecture) {
                    html += createMetricSection('Sleep Architecture', metrics.sleep_architecture);
                }
                
                // Respiratory Events
                if (metrics.respiratory_events) {
                    html += createMetricSection('Respiratory Events', metrics.respiratory_events);
                }
                
                // Other Metrics
                if (metrics.other_metrics) {
                    html += createMetricSection('Other Metrics', metrics.other_metrics);
                }
                
                // Diagnosis
                if (metrics.diagnosis) {
                    html += createMetricSection('Diagnosis', metrics.diagnosis);
                }
                
                // Study Info
                if (metrics.study_info) {
                    html += createMetricSection('Study Information', metrics.study_info);
                }
                
                html += '</div>';
                
                // Raw LLM Response
                if (analysis.raw_llm_response) {
                    html += `<div class="metric-category" style="margin-top: 20px;">
                        <h4>Raw LLM Response</h4>
                        <div class="pattern-result">${analysis.raw_llm_response}</div>
                    </div>`;
                }
                
            } else {
                html += `<div class="result-item error">
                    <strong>Analysis Failed:</strong> ${analysis.error || 'Unknown error'}<br>
                    ${analysis.raw_llm_response ? 
                        `<strong>Raw Response:</strong><br><div class="pattern-result">${analysis.raw_llm_response}</div>` : 
                        ''
                    }
                </div>`;
            }
            
            showResults(html);
        }
        
        function createMetricSection(title, metrics) {
            let html = `<div class="metric-category">
                <h4>${title}</h4>`;
            
            Object.entries(metrics).forEach(([key, value]) => {
                if (value !== null && value !== undefined && value !== '') {
                    const displayKey = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                    html += `<div class="metric-item">
                        <strong>${displayKey}:</strong> 
                        <span class="metric-value">${value}</span>
                    </div>`;
                }
            });
            
            html += '</div>';
            return html;
        }
        
        function extractAllMetrics() {
            const text = document.getElementById('reportText').value.trim();
            if (!text) {
                showError('Please enter some text to analyze');
                return;
            }
            
            showLoading();
            
            fetch('/o2-extraction/extract-all-metrics', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ 
                    text: text,
                    filename: 'manual_text_input'
                })
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.success) {
                    displayAllMetricsResults(data);
                } else {
                    showError(data.error || 'Failed to extract all metrics');
                }
            })
            .catch(error => {
                hideLoading();
                showError('Network error: ' + error.message);
            });
        }
        
        function runDirectLLMAnalysis() {
            if (!extractedContent) {
                showError('Please upload and extract a file first');
                return;
            }
            
            showLoading();
            
            fetch('/o2-extraction/direct-llm-analysis', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    text: extractedContent,
                    filename: currentFileName
                })
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.success) {
                    const metrics = data.extracted_data;
                    const metricsCount = data.metrics_found;
                    
                    let html = `
                    <div class="result-section">
                        <h3>🤖 Direct LLM Analysis Results (Claude-like)</h3>
                        <div class="success-message">Found ${metricsCount} sleep study metrics!</div>
                        
                        <div class="metrics-grid">`;
                    
                    // Display all extracted metrics
                    for (const [key, value] of Object.entries(metrics)) {
                        if (value !== null) {
                            const displayKey = key.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
                            html += `
                                <div class="metric-card">
                                    <div class="metric-name">${displayKey}</div>
                                    <div class="metric-value">${value}</div>
                                </div>`;
                        }
                    }
                    
                    html += `
                        </div>
                        
                        <div class="raw-response">
                            <h4>Raw LLM Response:</h4>
                            <pre>${data.raw_llm_response}</pre>
                        </div>
                    </div>`;
                    
                    showResults(html);
                } else {
                    showError(data.error || 'Direct LLM analysis failed');
                    if (data.raw_llm_response) {
                        showError('Raw LLM Response: ' + data.raw_llm_response);
                    }
                }
            })
            .catch(error => {
                hideLoading();
                showError('Network error: ' + error.message);
            });
        }
        
        function extractAllMetricsFromFile() {
            if (!extractedContent) {
                showError('Please upload and extract a file first');
                return;
            }
            
            showLoading();
            
            fetch('/o2-extraction/extract-all-metrics', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ 
                    text: extractedContent,
                    filename: currentFileName
                })
            })
            .then(response => response.json())
            .then(data => {
                hideLoading();
                if (data.success) {
                    displayAllMetricsResults(data);
                } else {
                    showError(data.error || 'Failed to extract all metrics');
                }
            })
            .catch(error => {
                hideLoading();
                showError('Network error: ' + error.message);
            });
        }
        
        function displayAllMetricsResults(data) {
            let html = `<h4>Complete Metrics Extraction Results for ${data.filename}</h4>`;
            html += `<div class="result-item success">
                <strong>Total Observations Found:</strong> ${data.total_observations}
            </div>`;
            
            // Display regex pattern results
            if (data.o2_specific_patterns) {
                html += '<div class="metrics-grid">';
                
                Object.entries(data.o2_specific_patterns).forEach(([category, patterns]) => {
                    if (patterns.length > 0) {
                        html += `<div class="metric-category">
                            <h4>${category.replace('_', ' ').toUpperCase()}</h4>`;
                        
                        patterns.forEach(pattern => {
                            html += `<div class="metric-item">
                                <strong>${pattern.pattern}:</strong> 
                                <span class="metric-value">${pattern.matches.join(', ')}</span>
                            </div>`;
                        });
                        
                        html += '</div>';
                    }
                });
                
                html += '</div>';
            }
            
            // Display parsed observations
            if (data.parsed_observations && data.parsed_observations.length > 0) {
                html += '<div class="metric-category">';
                html += '<h4>LLM Extracted Observations</h4>';
                
                data.parsed_observations.forEach(obs => {
                    html += `<div class="metric-item">
                        <strong>${obs.path || 'Unknown'}:</strong> 
                        <span class="metric-value">${obs.value}</span>
                        ${obs.explanation ? `<br><small>${obs.explanation}</small>` : ''}
                    </div>`;
                });
                
                html += '</div>';
            }
            
            // Display numerical data
            if (data.numerical_data) {
                html += '<div class="metric-category">';
                html += '<h4>Numerical Data Extraction</h4>';
                html += `<div class="pattern-result">${JSON.stringify(data.numerical_data, null, 2)}</div>`;
                html += '</div>';
            }
            
            // Display raw LLM output
            if (data.llm_observation_text) {
                html += '<div class="metric-category">';
                html += '<h4>Raw LLM Output</h4>';
                html += `<div class="pattern-result">${data.llm_observation_text}</div>`;
                html += '</div>';
            }
            
            showResults(html);
        }
    </script>
</body>
</html>
