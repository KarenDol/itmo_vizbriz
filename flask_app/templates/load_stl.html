<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STL Viewer</title>

  <!-- Include Three.js and required libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/BufferGeometryUtils.js"></script>
  
  <!-- Include jQuery -->
  <script src="{{ url_for('static', filename='js/jquery.min.js') }}"></script>
  
  <style>
    /* Global Styles */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
    }
    /* Header */
    .header {
      margin-bottom: 20px;
    }
    .header h1 {
      margin: 0;
      font-size: 1.8em;
    }
    .header p {
      margin: 5px 0 10px 0;
    }
    .header button {
      padding: 8px 15px;
      font-size: 14px;
      cursor: pointer;
    }
    /* Main Container: two columns (file list and viewer) */
    #main-container {
      display: flex;
      gap: 20px;
    }
    /* File List (Left Column) */
    #file-list {
      flex: 0 0 300px; /* Fixed width for file list */
      border-right: 1px solid #ccc;
      padding-right: 10px;
    }
    #file-list h2 {
      margin-bottom: 10px;
    }
    #files {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    #files li {
      margin-bottom: 10px;
      padding: 5px;
      cursor: pointer;
      border: 1px solid transparent;
      white-space: nowrap;
    }
    #files li:hover {
      border-color: #ccc;
    }
    #files li.selected {
      border-color: blue;
    }
    /* Viewer Section (Right Column) */
    #viewer {
      flex: 1;
      background-color: #000;
      height: 600px; /* Adjust as needed */
      position: relative;
    }
  </style>
</head>
<body>
  <!-- Header Section -->
  <div class="header">
    <h1>STL Viewer</h1>
    <p>Selected folder: <strong>{{ folder }}</strong></p>
    <!-- Load Files button calls loadSTLFiles() to reload the file list -->
    <button onclick="loadSTLFiles()">Load Files</button>
  </div>

  <!-- Main Container with two columns: File List and Viewer -->
  <div id="main-container">
    <!-- File List Section (Left Column) -->
    <div id="file-list">
      <h2>Available STL Files</h2>
      <ul id="files">
        <!-- File list will be populated dynamically via AJAX -->
      </ul>
    </div>

    <!-- Viewer Section (Right Column) -->
    <div id="viewer">
      <!-- The STL viewer (Three.js-based) will render here -->
    </div>
  </div>

  <script>
    // The folder is passed from Flask (e.g., "patients/1234/models")
    const folder = "{{ folder }}";

    // Function to load STL files from the backend.
    // Expected JSON response structure:
    // {
    //   "success": true,
    //   "stl_files": [
    //       { "file_name": "model1.stl", "url": "http://.../model1.stl" },
    //       { "file_name": "model2.glb", "url": "http://.../model2.glb" }
    //   ],
    //   "folder": "patients/..."
    // }
    function loadSTLFiles() {
      $.getJSON("/load_stl/" + encodeURIComponent(folder), function(data) {
        if (data.success) {
          const stlFiles = data.stl_files;
          if (stlFiles.length === 0) {
            alert("No STL or GLB files found in this folder.");
            return;
          }
          // Clear any existing file list.
          $("#files").empty();
          // Create a list item for each STL file.
          stlFiles.forEach(function(file, index) {
            const listItem = $("<li>")
              .text(file.file_name)
              .attr("data-url", file.url)
              .click(function() {
                // Remove "selected" class from all items and mark this one as selected.
                $("#files li").removeClass("selected");
                $(this).addClass("selected");
                // Call the custom loadSTL function to display the model.
                loadSTL(file.url);
              });
            $("#files").append(listItem);
          });
          // Optionally, load the first file by default.
          $("#files li").first().click();
        } else {
          alert("Error loading STL files: " + data.message);
        }
      }).fail(function(jqxhr, textStatus, error) {
        alert("Request failed: " + textStatus + ", " + error);
      });
    }

    // Inline Three.js STL Viewer code.
    // This function initializes a simple Three.js scene and loads the given STL file.
    function loadSTL(url) {
      // Clear the viewer container.
      const container = document.getElementById("viewer");
      container.innerHTML = "";

      // Create a WebGL renderer.
      const renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.setClearColor(0x000000, 1);
      container.appendChild(renderer.domElement);

      // Create a scene.
      const scene = new THREE.Scene();

      // Create a camera.
      const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
      camera.position.set(100, 100, 100);

      // Add orbit controls.
      const controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.target.set(0, 0, 0);
      controls.update();

      // Add lights from all directions.
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);
      const directionalLight1 = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight1.position.set(1, 1, 1);
      scene.add(directionalLight1);
      const directionalLight2 = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight2.position.set(-1, -1, -1);
      scene.add(directionalLight2);

      // Create the STL loader.
      const loader = new THREE.STLLoader();
      loader.load(url, function (geometry) {
        geometry.computeVertexNormals();

        // Create a basic material.
        const material = new THREE.MeshLambertMaterial({ color: 0xaaaaaa });
        const mesh = new THREE.Mesh(geometry, material);

        // Center the mesh.
        geometry.computeBoundingBox();
        const bbox = geometry.boundingBox;
        const center = new THREE.Vector3();
        bbox.getCenter(center);
        mesh.position.sub(center);

        scene.add(mesh);

        // Adjust the camera to fit the model.
        const size = new THREE.Vector3();
        bbox.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z);
        const fov = camera.fov * Math.PI / 180;
        let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));
        cameraZ *= 1.5; // add padding
        camera.position.set(0, 0, cameraZ);
        controls.update();
        camera.updateProjectionMatrix();
      },
      undefined,
      function(error) {
        console.error("Error loading STL file:", error);
      });

      // Animation loop.
      function animate() {
        requestAnimationFrame(animate);
        renderer.render(scene, camera);
      }
      animate();
    }

    // Automatically load the STL file list when the page loads.
    $(document).ready(function(){
      loadSTLFiles();
    });
  </script>
</body>
</html>
