<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLB to STL Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
        }
        .upload-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .upload-container h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        .upload-container input[type="file"] {
            margin: 10px 0;
        }
        .upload-container button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .upload-container button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="upload-container">
        <h1>Convert GLB to STL</h1>
        <form action="/convert_glb_to_stl" method="POST" enctype="multipart/form-data">
            <input type="file" name="file" accept=".glb" required>
            <br>
            <button type="submit">Upload and Convert</button>
        </form>
    </div>
</body>
</html>
