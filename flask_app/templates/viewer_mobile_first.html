<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- Mobile-first viewport setup -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>OSA Model Viewer</title>

  <!-- Include Three.js and additional libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/BufferGeometryUtils.js"></script>
    
  <!-- Main Desktop/Tablet and Mobile CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='viewer_templates/style.css') }}">
  <!-- The same style.css can contain responsive media queries OR you can add an additional mobile.css if you prefer -->
 
</head>
<body>

  <!--
    MOBILE NAVIGATION & TOGGLES
    Shown by default on small screens, hidden or repositioned on larger screens
  -->
  <div class="mobile-header">
    <!-- Toggle button for left panel (files) -->
    <button id="toggle-file-list" class="mobile-toggle-btn">&#x2630; Files</button>

    <!-- Center title or logo for mobile (optional) -->
    <div class="mobile-title">STL Viewer</div>

    <!-- Toggle for right panel (controls) -->
    <button id="toggle-controls" class="mobile-toggle-btn">&#x2630; Controls</button>
  </div>

  <!--
    CONTAINER for entire page
    We'll use a flexible layout so on desktop, left panel, viewer, and right panel can appear side by side
    On mobile, these can stack or be hidden behind toggles
  -->
  <div class="page-container">
    
    <!-- LEFT PANEL: File List + Title/Buttons -->
    <aside id="file-list-container" class="panel-left">
      <!-- Title and Buttons -->
      <div id="title-container">
        <div class="title-row">
          <img src="{{ url_for('static', filename='white-font-grey.png') }}" alt="Logo" class="title-logo" />
          <h1>STL Viewer</h1>
        </div>
        <div class="button-column">
          <button id="fullscreen-btn" class="small-button">Full Screen</button>
          <button id="load-selected" class="green-button">Load Selected STL(s)</button>
        </div>
      </div>
      <!-- File List -->
      <div id="file-list">
        <h2>Available STL Files</h2>
        <ul id="files">
          {% if files and files|length > 0 %}
            {% for file in files %}
              <li class="file-item">
                <input type="checkbox" id="file-{{ loop.index }}" data-url="{{ file.url }}">
                <label for="file-{{ loop.index }}">{{ file.file_name }}</label>
              </li>
            {% endfor %}
          {% else %}
            <li class="no-files">No STL or GLB files available for this patient.</li>
          {% endif %}
        </ul>
      </div>
    </aside>

    <!-- MAIN VIEWER SECTION -->
    <section id="viewer-section">
      <div id="viewer">
        <div id="dicom-container"></div>
        <div id="loading-spinner" class="loading-spinner"></div> <!-- Spinner -->
      </div>
    </section>

    <!-- RIGHT PANEL: Controls Configuration -->
    <aside id="controls-container" class="panel-right">
      <h3>Object Configuration</h3>
      <label for="object-selector">Select Object</label>
      <select id="object-selector">
        <option value="all">All Objects</option>
      </select>

      <label for="material-type">Material Type</label>
      <select id="material-type">
        <option value="lambert">Lambert</option>
        <option value="standard">Standard</option>
        <option value="phong">Phong</option>
        <option value="physical">Physical</option>
      </select>

      <label for="object-color">Object Color</label>
      <input id="object-color" type="color" value="#808080">

      <label for="roughness">Roughness</label>
      <input id="roughness" type="range" min="0" max="1" step="0.01" value="0.5">

      <label for="opacity">Opacity</label>
      <input id="opacity" type="range" min="0" max="1" step="0.01" value="1">

      <h3>Lighting Configuration</h3>
      <label for="ambient-light-intensity">Ambient Light Intensity</label>
      <input id="ambient-light-intensity" type="range" min="0" max="10" step="0.1" value="0.6">

      <label for="hemisphere-light-intensity">Hemisphere Light Intensity</label>
      <input id="hemisphere-light-intensity" type="range" min="0" max="10" step="0.1" value="0.5">

      <label for="directional-light1-intensity">Directional Light 1 Intensity</label>
      <input id="directional-light1-intensity" type="range" min="0" max="10" step="0.1" value="1">

      <h3>Scene Configuration</h3>
      <label for="bounding-box-toggle">Bounding Box</label>
      <input id="bounding-box-toggle" type="checkbox">

      <label for="grid-toggle">Grid</label>
      <input id="grid-toggle" type="checkbox">
    </aside>
    
  </div> <!-- end page-container -->

  <!-- Hidden data attribute for Python/Flask usage -->
  <div id="patient-info" data-patient-id="{{ patient_id }}"></div>

  <!-- Scripts -->
  <script type="module" src="{{ url_for('static', filename='js/viewerApp.js') }}"></script>
</body>
</html>
