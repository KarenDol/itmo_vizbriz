<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracking Debug Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        button { margin: 5px; padding: 10px; }
        #debug-output { background: #f5f5f5; padding: 10px; margin: 10px 0; }
    </style>
</head>
<body>
    <h1>Tracking Debug Test</h1>
    
    <div class="test-section">
        <h3>1. Test Page View Tracking</h3>
        <button onclick="testPageView()">Track Page View (stage_a_step_1)</button>
        <button onclick="testPageView2()">Track Page View (stage_a_step_2)</button>
        <button onclick="testPageView3()">Track Page View (stage_a_step_3)</button>
    </div>
    
    <div class="test-section">
        <h3>2. Test CTA Tracking</h3>
        <button onclick="testCTAClick()">Track CTA Click (submit_stage_a)</button>
        <button onclick="testCTAClick2()">Track CTA Click (schedule_sleep_test)</button>
    </div>
    
    <div class="test-section">
        <h3>3. Check Database</h3>
        <button onclick="checkDatabase()">Check Database for Tracking Data</button>
    </div>
    
    <div id="debug-output">
        <h4>Debug Output:</h4>
        <div id="output"></div>
    </div>

    <!-- Include engagement tracking -->
    <script src="/static/js/engagement_tracking.js"></script>

    <script>
        function log(message) {
            const output = document.getElementById('output');
            const timestamp = new Date().toLocaleTimeString();
            output.innerHTML += `<div>[${timestamp}] ${message}</div>`;
            console.log(message);
        }

        async function testPageView() {
            log('Testing page view tracking...');
            try {
                await trackPageView('stage_a_step_1', { 
                    step_number: 1, 
                    step_name: 'introduction',
                    test: true 
                });
                log('✅ Page view tracking completed');
            } catch (error) {
                log(`❌ Page view tracking failed: ${error.message}`);
            }
        }

        async function testPageView2() {
            log('Testing page view tracking (step 2)...');
            try {
                await trackPageView('stage_a_step_2', { 
                    step_number: 2, 
                    step_name: 'personal_info',
                    test: true 
                });
                log('✅ Page view tracking (step 2) completed');
            } catch (error) {
                log(`❌ Page view tracking (step 2) failed: ${error.message}`);
            }
        }

        async function testPageView3() {
            log('Testing page view tracking (step 3)...');
            try {
                await trackPageView('stage_a_step_3', { 
                    step_number: 3, 
                    step_name: 'clinical_assessment',
                    test: true 
                });
                log('✅ Page view tracking (step 3) completed');
            } catch (error) {
                log(`❌ Page view tracking (step 3) failed: ${error.message}`);
            }
        }

        async function testCTAClick() {
            log('Testing CTA click tracking...');
            try {
                await trackCTAClick('submit_stage_a', 'Submit Quiz', {
                    quiz_type: 'basic_quiz',
                    test: true
                });
                log('✅ CTA click tracking completed');
            } catch (error) {
                log(`❌ CTA click tracking failed: ${error.message}`);
            }
        }

        async function testCTAClick2() {
            log('Testing CTA click tracking (schedule)...');
            try {
                await trackCTAClick('schedule_sleep_test', 'Schedule Sleep Test', {
                    quiz_type: 'basic_quiz',
                    test: true
                });
                log('✅ CTA click tracking (schedule) completed');
            } catch (error) {
                log(`❌ CTA click tracking (schedule) failed: ${error.message}`);
            }
        }

        async function checkDatabase() {
            log('Checking database for tracking data...');
            try {
                const response = await fetch('/funnel-analytics');
                if (response.ok) {
                    const html = await response.text();
                    log('✅ Funnel analytics page loaded successfully');
                    log('Check the funnel analytics page to see if tracking data appears');
                } else {
                    log(`❌ Failed to load funnel analytics: ${response.status}`);
                }
            } catch (error) {
                log(`❌ Error checking database: ${error.message}`);
            }
        }

        // Auto-test on page load
        document.addEventListener('DOMContentLoaded', function() {
            log('Page loaded, tracking should be initialized');
            log('Session ID: ' + (window.engagementTracker ? window.engagementTracker.sessionId : 'Not available'));
        });
    </script>
</body>
</html>
