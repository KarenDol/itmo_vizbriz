<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration Wizard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .wizard-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .progress {
            height: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="wizard-header">{{ clinic.name }} - Vizbriz</h1>
        <div class="progress mb-4">
            <div class="progress-bar" id="progress-bar" style="width: 10%;" role="progressbar" aria-valuenow="10" aria-valuemin="0" aria-valuemax="100">10%</div>
        </div>
        <nav>
            <a href="/patient-wizard?clinic_id={{ clinic.id }}">Patient Wizard</a>
        </nav>
        {% if clinic.id %}
        <div class="mb-3">
            <img src="{{ url_for('generate_qr', clinic_id=clinic.id) }}" alt="Clinic QR Code">
        </div>
        {% endif %}
        <form id="patient-form" enctype="multipart/form-data">
            <!-- Stage 1: Personal Information -->
            <div class="form-stage" id="stage-1">
                <h2>Personal Information</h2>
                <div class="mb-3">
                    <label for="first-name" class="form-label">First Name</label>
                    <input type="text" class="form-control" id="first-name" name="first_name" required>
                </div>
                <div class="mb-3">
                    <label for="middle-name" class="form-label">Middle Name</label>
                    <input type="text" class="form-control" id="middle-name" name="middle_name">
                </div>
                <div class="mb-3">
                    <label for="last-name" class="form-label">Last Name</label>
                    <input type="text" class="form-control" id="last-name" name="last_name" required>
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required>
                </div>
                <div class="mb-3">
                    <label for="phone" class="form-label">Phone Number</label>
                    <input type="tel" class="form-control" id="phone" name="phone" required>
                </div>
                <div class="mb-3">
                    <label for="dob" class="form-label">Date of Birth</label>
                    <input type="date" class="form-control" id="dob" name="dob" required>
                </div>
                <div class="mb-3">
                    <label for="gender" class="form-label">Gender</label>
                    <select class="form-select" id="gender" name="gender" required>
                        <option value="">Select</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="insurance-front" class="form-label">Upload Insurance Card (Front)</label>
                    <input type="file" class="form-control" id="insurance-front" name="insurance_front" required>
                </div>
                <div class="mb-3">
                    <label for="insurance-back" class="form-label">Upload Insurance Card (Back)</label>
                    <input type="file" class="form-control" id="insurance-back" name="insurance_back" required>
                </div>
                <button type="button" class="btn btn-primary" onclick="nextStage()">Next</button>
            </div>

            <!-- Additional stages will be similarly structured -->
            <!-- Submit Button for the Final Stage -->
            <div class="form-stage d-none" id="final-stage">
                <h2>HIPAA Authorization</h2>
                <p>Please sign the HIPAA authorization document below:</p>
                <textarea class="form-control" placeholder="HIPAA authorization text..." rows="5" readonly></textarea>
                <div class="form-check mt-3">
                    <input type="checkbox" class="form-check-input" id="consent" required>
                    <label for="consent" class="form-check-label">I agree and authorize as required.</label>
                </div>
                <button type="submit" class="btn btn-success">Submit</button>
            </div>
        </form>
    </div>

    <script>
        let currentStage = 1;
        function nextStage() {
            document.getElementById(`stage-${currentStage}`).classList.add('d-none');
            currentStage++;
            document.getElementById(`stage-${currentStage}`).classList.remove('d-none');
            updateProgressBar();
        }

        function updateProgressBar() {
            const progress = (currentStage / 5) * 100; // Adjust for the total number of stages
            document.getElementById('progress-bar').style.width = progress + '%';
            document.getElementById('progress-bar').innerText = Math.floor(progress) + '%';
        }
    </script>
</body>
</html>
