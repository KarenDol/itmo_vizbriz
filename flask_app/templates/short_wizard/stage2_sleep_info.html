<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Short Patient Onboarding - Sleep Test Information</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .wizard-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin: 1rem auto;
            max-width: 800px;
            overflow: hidden;
        }
        
        @media (max-width: 768px) {
            .wizard-container {
                margin: 0.5rem;
                border-radius: 10px;
            }
        }
        .wizard-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .wizard-header {
                padding: 1.5rem 1rem;
            }
            .wizard-header h1 {
                font-size: 1.5rem;
            }
        }
        .wizard-header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 600;
        }
        .wizard-header p {
            margin: 0.5rem 0 0 0;
            opacity: 0.9;
        }
        .progress-container {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 0.5rem;
            margin-top: 1rem;
        }
        .progress {
            height: 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.3);
        }
        .progress-bar {
            background: #4CAF50;
            border-radius: 4px;
        }
        .wizard-body {
            padding: 2rem;
        }
        
        @media (max-width: 768px) {
            .wizard-body {
                padding: 1rem;
            }
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
        }
        .form-control {
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 0.75rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        
        @media (max-width: 768px) {
            .btn-primary {
                padding: 1rem 1.5rem;
                font-size: 1rem;
                width: 100%;
                margin-bottom: 0.5rem;
            }
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .required {
            color: #dc3545;
        }
        .section-title {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e9ecef;
        }
        .sleep-test-section {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="wizard-container">
            <div class="wizard-header">
                <h1><i class="fas fa-bed me-2"></i>Sleep Test Information</h1>
                <p>Short Patient Onboarding - Step 2 of 5</p>
                <div class="progress-container">
                    <div class="progress">
                        <div class="progress-bar" style="width: 40%"></div>
                    </div>
                    <small class="mt-2 d-block">40% Complete</small>
                </div>
            </div>
            
            <div class="wizard-body">
                <form method="POST" action="{{ url_for('short_wizard.stage2_sleep_info') }}" enctype="multipart/form-data">
                    <!-- Preserve dentist_id parameter -->
                    {% if request.args.get('dentist_id') %}
                    <input type="hidden" name="dentist_id" value="{{ request.args.get('dentist_id') }}">
                    {% endif %}
                    <!-- Sleep Test Information -->
                    <div class="section-title">
                        <i class="fas fa-clipboard-check me-2"></i>Sleep Test Details
                    </div>
                    
                    <div class="sleep-test-section">
                        <div class="form-group">
                            <label class="form-label">Have you had a sleep test? <span class="required">*</span></label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="has_sleep_test" id="sleep_test_yes" value="yes" required>
                                <label class="form-check-label" for="sleep_test_yes">
                                    Yes, I have had a sleep test
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="has_sleep_test" id="sleep_test_no" value="no" required>
                                <label class="form-check-label" for="sleep_test_no">
                                    No, I have not had a sleep test
                                </label>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Sleep Test Details (shown when "Yes" is selected) -->
                    <div id="sleep_test_details" style="display: none;">
                        <div class="section-title">
                            <i class="fas fa-calendar-alt me-2"></i>Sleep Test Details
                        </div>
                        
                        <div class="form-group">
                            <label for="sleep_test_date" class="form-label">When did you have your sleep test?</label>
                            <input type="date" class="form-control" id="sleep_test_date" name="sleep_test_date">
                        </div>
                        
                        <div class="form-group">
                            <label for="sleep_test_physician" class="form-label">Which doctor ordered your sleep test?</label>
                            <input type="text" class="form-control" id="sleep_test_physician" name="sleep_test_physician" 
                                   placeholder="Doctor's name">
                        </div>
                        
                        <!-- File Upload Section -->
                        <div class="form-group">
                            <label for="sleep_test_result" class="form-label">Upload Sleep Test Result (Optional)</label>
                            <input type="file" class="form-control" id="sleep_test_result" name="sleep_test_result" accept=".pdf,.jpg,.jpeg,.png,.doc,.docx">
                            <small class="form-text text-muted">Upload your sleep test results or report</small>
                        </div>
                    </div>
                    
                    <!-- Desktop Navigation -->
                    <div class="d-flex justify-content-between mt-4 d-none d-md-flex">
                        <a href="{{ url_for('short_wizard.stage1_personal_info') }}" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Back to Personal Information
                        </a>
                        <button type="submit" class="btn btn-primary">
                            Continue to CPAP Intolerance <i class="fas fa-arrow-right ms-2"></i>
                        </button>
                    </div>
                    
                    <!-- Mobile Navigation -->
                    <div class="d-flex flex-column d-md-none mt-4">
                        <button type="submit" class="btn btn-primary mb-3">
                            Continue to CPAP Intolerance <i class="fas fa-arrow-right ms-2"></i>
                        </button>
                        <a href="{{ url_for('short_wizard.stage1_personal_info') }}" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Back to Personal Information
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Show/hide sleep test details based on selection
        document.querySelectorAll('input[name="has_sleep_test"]').forEach(radio => {
            radio.addEventListener('change', function() {
                const detailsSection = document.getElementById('sleep_test_details');
                if (this.value === 'yes') {
                    detailsSection.style.display = 'block';
                } else {
                    detailsSection.style.display = 'none';
                }
            });
        });
        
        // Display error message if present
        {% if error_message %}
        alert('Error: {{ error_message }}');
        {% endif %}
    </script>
</body>
</html>
