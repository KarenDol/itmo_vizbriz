<!DOCTYPE html>
<html>
<head>
  <title>Vzibriz Clinical Image Viewer</title>
  <!-- Include jQuery (if not already included in your project) -->
  <script src="{{ url_for('static', filename='js/jquery.min.js') }}"></script>
  <style>
    /* Global Styles */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
    }
    /* Header Section */
    .header {
      text-align: left;
      margin-bottom: 20px;
    }
    .header h3 {
      margin: 5px 0;
    }
    .header p {
      margin: 5px 0 10px 0;
    }
    .header button {
      padding: 8px 15px;
      font-size: 14px;
      cursor: pointer;
    }
    /* Filmstrip (ruler) styling */
    .filmstrip {
      display: flex;
      overflow-x: auto;
      margin-bottom: 20px;
      padding: 5px;
      border-bottom: 1px solid #ccc;
    }
    .filmstrip img {
      height: 100px;
      margin-right: 5px;
      cursor: pointer;
      border: 2px solid transparent;
    }
    .filmstrip img.selected {
      border-color: blue;
    }
    /* Main Image Viewer */
    .main-viewer {
      text-align: center;
    }
    #mainImage {
      max-width: 800px;
      max-height: 800px;
      border: 2px solid #ccc;
      display: block;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <!-- Header Section -->
  <div class="header">
    <h3>Image Viewer</h3>
    <p>Selected folder: <strong>{{ folder }}</strong></p>
    <button onclick="loadImageFiles()">Load Image Files</button>
  </div>
  
  <!-- Filmstrip: thumbnails for browsing images -->
  <div class="filmstrip" id="filmstrip">
    <!-- Thumbnails will be appended here -->
  </div>
  
  <!-- Main Viewer: displays the currently selected image -->
  <div class="main-viewer">
    <img id="mainImage" src="" alt="Image Viewer">
  </div>
  
  <script>
    // The folder is passed from Flask (for example, "patients/1234/images")
    const folder = "{{ folder }}";

    // Function to load image files from the backend.
    // Expected JSON response structure:
    // { "success": true, "image_files": [ { "file_name": "img1.jpg", "url": "http://.../img1.jpg" }, ... ] }
    function loadImageFiles() {
      $.getJSON("/load_images/" + encodeURIComponent(folder), function(data) {
        if (data.success) {
          let images = data.image_files;
          if (images.length === 0) {
            alert("No image files found in this folder.");
            return;
          }
          // Clear any existing thumbnails.
          $("#filmstrip").empty();
          // For each image, create a thumbnail.
          images.forEach(function(image, index) {
            let thumb = $("<img>")
              .attr("src", image.url)
              .attr("data-index", index)
              .attr("alt", image.file_name)
              .click(function() {
                // When a thumbnail is clicked, update the main image.
                $("#mainImage").attr("src", image.url);
                // Highlight the selected thumbnail.
                $("#filmstrip img").removeClass("selected");
                $(this).addClass("selected");
              });
            $("#filmstrip").append(thumb);
          });
          // Display the first image by default.
          $("#mainImage").attr("src", images[0].url);
          $("#filmstrip img").first().addClass("selected");
        } else {
          alert("Error loading images: " + data.message);
        }
      }).fail(function(jqxhr, textStatus, error) {
        alert("Request failed: " + textStatus + ", " + error);
      });
    }

    // When the page loads, call loadImageFiles() to automatically display a default image.
    $(document).ready(function(){
      loadImageFiles();
    });
  </script>
</body>
</html>
