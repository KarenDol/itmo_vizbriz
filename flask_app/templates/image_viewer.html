<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Viewer</title>
    <style>
        #imageViewer {
            max-width: 800px;
            margin: 20px auto;
            font-family: Arial, sans-serif;
        }

        #imageContainer {
            background-color: #f5f5f5;
            min-height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 10px 0;
            border-radius: 4px;
        }

        #imageContainer img {
            max-width: 100%;
            max-height: 600px;
            object-fit: contain;
        }

        #imageControls {
            background-color: #f5f5f5;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 10px;
        }

        #imageInfo, #fileName {
            margin-bottom: 10px;
            color: #333;
        }

        #imageSlider {
            width: 100%;
            height: 20px;
            margin: 10px 0;
        }

        .navigation-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 8px 16px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background-color: #45a049;
        }

        button:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div id="imageViewer">
        <h1>Image Viewer</h1>
        <div id="imageControls">
            <div id="imageInfo">
                Image: <span id="currentImage">0</span>/<span id="totalImages">0</span>
            </div>
            <div id="fileName">
                File: <span id="currentFileName">None</span>
            </div>
            <input type="range" id="imageSlider" value="0" min="0" max="0">
            <div class="navigation-buttons">
                <button id="prevButton" onclick="viewer.previousImage()" disabled>Previous</button>
                <button id="nextButton" onclick="viewer.nextImage()" disabled>Next</button>
            </div>
        </div>
        <div id="imageContainer"></div>
    </div>

    <script>
        class ImageViewer {
            constructor(container) {
                this.container = document.getElementById(container);
                this.currentIndex = 0;
                this.images = [];
                this.setupControls();
            }

            loadImages(presignedUrls) {
                this.images = presignedUrls;
                document.getElementById('totalImages').textContent = this.images.length;
                document.getElementById('imageSlider').max = this.images.length - 1;
                this.updateNavigationButtons();
                if (this.images.length > 0) {
                    this.showImage(0);
                }
            }

            showImage(index) {
                const imageContainer = document.getElementById('imageContainer');
                imageContainer.innerHTML = `<img src="${this.images[index].url}" alt="Image ${index + 1}">`;
                document.getElementById('currentImage').textContent = index + 1;
                document.getElementById('currentFileName').textContent = this.images[index].name;
                document.getElementById('imageSlider').value = index;
                this.currentIndex = index;
                this.updateNavigationButtons();
            }

            updateNavigationButtons() {
                document.getElementById('prevButton').disabled = this.currentIndex === 0;
                document.getElementById('nextButton').disabled = this.currentIndex === this.images.length - 1;
            }

            setupControls() {
                const slider = document.getElementById('imageSlider');
                slider.addEventListener('input', (e) => {
                    this.showImage(parseInt(e.target.value));
                });

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'ArrowRight') this.nextImage();
                    if (e.key === 'ArrowLeft') this.previousImage();
                });
            }

            nextImage() {
                if (this.currentIndex < this.images.length - 1) {
                    this.showImage(this.currentIndex + 1);
                }
            }

            previousImage() {
                if (this.currentIndex > 0) {
                    this.showImage(this.currentIndex - 1);
                }
            }
        }

        // Initialize viewer
        const viewer = new ImageViewer('imageViewer');

        // Example usage with presigned URLs
        // Replace this with your actual data loading logic
        const exampleUrls = [
            { url: 'presigned-url-1', name: 'image1.jpg' },
            { url: 'presigned-url-2', name: 'image2.jpg' }
        ];
        viewer.loadImages(exampleUrls);
    </script>
</body>
</html>
