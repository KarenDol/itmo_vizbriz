<!doctype html>
<html>
<head>
    <title>Dropbox File Download</title>
</head>
<body>
    <h1>Download File from Dropbox</h1>
    <form method="post" action="/download">
        <label for="dropbox_url">Dropbox File URL:</label>
        <input type="text" id="dropbox_url" name="dropbox_url" required>
        <input type="submit" value="Download">
    </form>
</body>
</html>
