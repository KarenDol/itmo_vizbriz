{% extends "base.html" %}

{% block title %}Create New Claim - Vzibriz OSA Management System{% endblock %}

{% block extra_css %}
<style>
    .file-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 5px;
        background-color: #f1f1f1;
        margin-top: 5px;
    }
    .file-item i {
        cursor: pointer;
    }
</style>
{% endblock %}

{% block content %}
<div class="row">
    <div class="col s12 m10 offset-m1">
        <div class="card">
            <div class="card-content">
                <span class="card-title">Create New Claim</span>
                <form id="claim-form" method="POST" action="{{ url_for('dashboard.create_claim') }}" enctype="multipart/form-data">
                    <div class="row">
                        <!-- Autocomplete for Patient -->
                        <div class="input-field col s12 m6">
                            <input type="text" id="patient_autocomplete" class="autocomplete" required>
                            <label for="patient_autocomplete">Patient Name</label>
                            <input type="hidden" id="patient_id" name="patient_id">
                        </div>

                        <!-- Autocomplete for Dentist -->
                        <div class="input-field col s12 m6">
                            <input type="text" id="dentist_autocomplete" class="autocomplete" required>
                            <label for="dentist_autocomplete">Dentist Name</label>
                            <input type="hidden" id="dentist_id" name="dentist_id">
                        </div>
                    </div>

                    <div class="row">
                        <!-- Insurer -->
                        <div class="input-field col s12">
                            <input type="text" name="insurer" id="insurer" required>
                            <label for="insurer">Insurer</label>
                        </div>
                    </div>

                    <div class="row">
                        <!-- Treatment Recommendations -->
                        <div class="input-field col s12">
                            <select id="treatment_recommendations" name="treatment_recommendations" class="browser-default" required>
                                <option value="" disabled selected>Choose a treatment</option>
                                <option value="Oral Appliance">Oral Appliance</option>
                                <option value="Other">Other (Specify below)</option>
                            </select>
                        </div>

                        <!-- Treatment Description if 'Other' is selected -->
                        <div class="input-field col s12" id="other_treatment_field" style="display:none;">
                            <input type="text" id="other_treatment" name="other_treatment">
                            <label for="other_treatment">Specify Other Treatment</label>
                        </div>
                    </div>

                    <div class="row">
                        <!-- Claim Amount -->
                        <div class="input-field col s12 m6">
                            <input type="number" step="0.01" id="claim_amount" name="claim_amount" required>
                            <label for="claim_amount">Claim Amount</label>
                        </div>

                        <!-- Deductible -->
                        <div class="input-field col s12 m6">
                            <input type="number" step="0.01" id="deductible" name="deductible">
                            <label for="deductible">Deductible (Optional)</label>
                        </div>
                    </div>

                    <div class="row">
                        <!-- Status Dropdown -->
                        <div class="input-field col s12">
                            <select id="status" name="status" class="browser-default" required>
                                <option value="" disabled selected>Choose Claim Status</option>
                                <option value="Pending">Pending</option>
                                <option value="Received">Received</option>
                                <option value="In Process">In Process</option>
                                <option value="Approved">Approved</option>
                                <option value="Denied">Denied</option>
                                <option value="Paid">Paid</option>
                                <option value="Rejected">Rejected</option>
                                <option value="Suspended">Suspended</option>
                                <option value="Finalized">Finalized</option>
                                <option value="Adjusted">Adjusted</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <!-- Comments -->
                        <div class="input-field col s12">
                            <textarea id="comments" name="comments" class="materialize-textarea"></textarea>
                            <label for="comments">Comments</label>
                        </div>
                    </div>

                    <!-- File Upload Section -->
                    <div class="row">
                        <div class="col s12">
                            <div class="file-field input-field">
                                <div class="btn">
                                    <span>Add Files</span>
                                    <input type="file" id="fileElemClaim" multiple>
                                </div>
                                <div class="file-path-wrapper">
                                    <input class="file-path validate" type="text" placeholder="Upload one or more files">
                                </div>
                            </div>
                            <div id="file-list-claim" class="file-list"></div>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="row">
                        <div class="col s12 center-align">
                            <button type="submit" class="btn waves-effect waves-light">Submit Claim</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.addEventListener('DOMContentLoaded', function() {
        M.AutoInit();

        // Autocomplete configuration for patient and dentist
        const patientAutocomplete = document.getElementById('patient_autocomplete');
        const dentistAutocomplete = document.getElementById('dentist_autocomplete');

        M.Autocomplete.init(patientAutocomplete, {
            data: { /* Populate with patient data from the server */ },
            onAutocomplete: function(value) {
                // Set patient_id based on selected value
                document.getElementById('patient_id').value = value;
            }
        });

        M.Autocomplete.init(dentistAutocomplete, {
            data: { /* Populate with dentist data from the server */ },
            onAutocomplete: function(value) {
                // Set dentist_id based on selected value
                document.getElementById('dentist_id').value = value;
            }
        });

        // Show/hide other treatment field based on selection
        document.getElementById('treatment_recommendations').addEventListener('change', function() {
            const otherField = document.getElementById('other_treatment_field');
            otherField.style.display = this.value === 'Other' ? 'block' : 'none';
        });

        // Handle file uploads
        const fileElemClaim = document.getElementById('fileElemClaim');
        const fileListClaim = document.getElementById('file-list-claim');

        fileElemClaim.addEventListener('change', function() {
            Array.from(this.files).forEach(file => {
                const fileItem = document.createElement('div');
                fileItem.className = 'file-item';
                fileItem.innerHTML = `
                    <span>${file.name}</span>
                    <i class="material-icons" onclick="this.parentElement.remove()">close</i>
                `;
                fileListClaim.appendChild(fileItem);
            });
        });
    });
</script>
{% endblock %}
