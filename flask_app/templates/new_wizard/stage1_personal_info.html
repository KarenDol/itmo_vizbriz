<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simplified Patient Onboarding - Personal Information</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .wizard-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin: 2rem auto;
            max-width: 800px;
            overflow: hidden;
        }
        .wizard-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .wizard-header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 600;
        }
        .wizard-header p {
            margin: 0.5rem 0 0 0;
            opacity: 0.9;
        }
        .progress-container {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 0.5rem;
            margin-top: 1rem;
        }
        .progress {
            height: 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.3);
        }
        .progress-bar {
            background: #4CAF50;
            border-radius: 4px;
        }
        .wizard-body {
            padding: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
        }
        .form-control {
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 0.75rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .required {
            color: #dc3545;
        }
        .section-title {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="wizard-container">
            <div class="wizard-header">
                <h1><i class="fas fa-user-plus me-2"></i>Personal Information</h1>
                <p>Simplified Patient Onboarding - Step 1 of 5</p>
                <div class="progress-container">
                    <div class="progress">
                        <div class="progress-bar" style="width: 20%"></div>
                    </div>
                    <small class="mt-2 d-block">20% Complete</small>
                </div>
            </div>
            
            <div class="wizard-body">
                <form method="POST" action="{{ url_for('new_wizard.stage1_personal_info') }}">
                    <!-- Basic Information -->
                    <div class="section-title">
                        <i class="fas fa-user me-2"></i>Basic Information
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="first_name" class="form-label">First Name <span class="required">*</span></label>
                                <input type="text" class="form-control" id="first_name" name="first_name" 
                                       value="{{ personal_info.first_name or '' }}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="last_name" class="form-label">Last Name <span class="required">*</span></label>
                                <input type="text" class="form-control" id="last_name" name="last_name" 
                                       value="{{ personal_info.last_name or '' }}" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="email" class="form-label">Email Address <span class="required">*</span></label>
                                <input type="email" class="form-control" id="email" name="email" 
                                       value="{{ personal_info.email or '' }}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="phone" class="form-label">Phone Number <span class="required">*</span></label>
                                <input type="tel" class="form-control" id="phone" name="phone" 
                                       value="{{ personal_info.phone or '' }}" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="date_of_birth" class="form-label">Date of Birth <span class="required">*</span></label>
                        <input type="date" class="form-control" id="date_of_birth" name="date_of_birth" 
                               value="{{ personal_info.date_of_birth or '' }}" required>
                    </div>
                    
                    <!-- Address Information -->
                    <div class="section-title">
                        <i class="fas fa-map-marker-alt me-2"></i>Address Information
                    </div>
                    
                    <div class="form-group">
                        <label for="address" class="form-label">Street Address <span class="required">*</span></label>
                        <input type="text" class="form-control" id="address" name="address" 
                               value="{{ personal_info.address or '' }}" required>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="city" class="form-label">City <span class="required">*</span></label>
                                <input type="text" class="form-control" id="city" name="city" 
                                       value="{{ personal_info.city or '' }}" required>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="state" class="form-label">State <span class="required">*</span></label>
                                <input type="text" class="form-control" id="state" name="state" 
                                       value="{{ personal_info.state or '' }}" required>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="zip_code" class="form-label">ZIP Code <span class="required">*</span></label>
                                <input type="text" class="form-control" id="zip_code" name="zip_code" 
                                       value="{{ personal_info.zip_code or '' }}" required>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Emergency Contact -->
                    <div class="section-title">
                        <i class="fas fa-phone me-2"></i>Emergency Contact
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="emergency_contact_name" class="form-label">Emergency Contact Name <span class="required">*</span></label>
                                <input type="text" class="form-control" id="emergency_contact_name" name="emergency_contact_name" 
                                       value="{{ personal_info.emergency_contact_name or '' }}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="emergency_contact_phone" class="form-label">Emergency Contact Phone <span class="required">*</span></label>
                                <input type="tel" class="form-control" id="emergency_contact_phone" name="emergency_contact_phone" 
                                       value="{{ personal_info.emergency_contact_phone or '' }}" required>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Hidden clinic_id field -->
                    {% if clinic_id %}
                    <input type="hidden" name="clinic_id" value="{{ clinic_id }}">
                    {% endif %}
                    
                    <!-- Navigation Buttons -->
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Cancel
                        </a>
                        <button type="submit" class="btn btn-primary">
                            Continue to Sleep Test Information <i class="fas fa-arrow-right ms-2"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
