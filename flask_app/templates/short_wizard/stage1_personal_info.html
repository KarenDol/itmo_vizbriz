<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Short Patient Onboarding - Personal Information</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .wizard-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            margin: 2rem auto;
            max-width: 800px;
            overflow: hidden;
        }
        .wizard-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }
        .wizard-header h1 {
            margin: 0;
            font-size: 2rem;
            font-weight: 600;
        }
        .wizard-header p {
            margin: 0.5rem 0 0 0;
            opacity: 0.9;
        }
        .progress-container {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 0.5rem;
            margin-top: 1rem;
        }
        .progress {
            height: 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.3);
        }
        .progress-bar {
            background: #4CAF50;
            border-radius: 4px;
        }
        .wizard-body {
            padding: 2rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
        }
        .form-control {
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 0.75rem;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            padding: 0.75rem 2rem;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        .required {
            color: #dc3545;
        }
        .section-title {
            color: #667eea;
            font-weight: 600;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="wizard-container">
            <div class="wizard-header">
                <h1><i class="fas fa-user-plus me-2"></i>Personal Information</h1>
                <p>Short Patient Onboarding - Step 1 of 5</p>
                <div class="progress-container">
                    <div class="progress">
                        <div class="progress-bar" style="width: 20%"></div>
                    </div>
                    <small class="mt-2 d-block">20% Complete</small>
                </div>
            </div>
            
            <div class="wizard-body">
                <form method="POST" action="{{ url_for('short_wizard.stage1_personal_info') }}" id="personal-info-form">
                    <!-- Preserve dentist_id parameter -->
                    {% if request.args.get('dentist_id') %}
                    <input type="hidden" name="dentist_id" value="{{ request.args.get('dentist_id') }}">
                    {% endif %}
                    <!-- Basic Information -->
                    <div class="section-title">
                        <i class="fas fa-user me-2"></i>Basic Information
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="first_name" class="form-label">First Name <span class="required">*</span></label>
                                <input type="text" class="form-control" id="first_name" name="first_name" 
                                       value="{{ personal_info.first_name or '' }}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="last_name" class="form-label">Last Name <span class="required">*</span></label>
                                <input type="text" class="form-control" id="last_name" name="last_name" 
                                       value="{{ personal_info.last_name or '' }}" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="email" class="form-label">Email Address <span class="required">*</span></label>
                                <input type="email" class="form-control" id="email" name="email" 
                                       value="{{ personal_info.email or '' }}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label for="phone" class="form-label">Phone Number <span class="required">*</span></label>
                                <input type="tel" class="form-control" id="phone" name="phone" 
                                       value="{{ personal_info.phone or '' }}" required>
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="date_of_birth" class="form-label">Date of Birth <span class="required">*</span></label>
                        <input type="date" class="form-control" id="date_of_birth" name="date_of_birth" 
                               value="{{ personal_info.date_of_birth or '' }}" required>
                    </div>
                    
                    <!-- Address Information -->
                    <div class="section-title">
                        <i class="fas fa-map-marker-alt me-2"></i>Address Information (Optional)
                    </div>
                    
                    <div class="form-group">
                        <label for="address" class="form-label">Street Address</label>
                        <input type="text" class="form-control" id="address" name="address" 
                               value="{{ personal_info.address or '' }}">
                    </div>
                    
                    <div class="row">
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="city" class="form-label">City</label>
                                <input type="text" class="form-control" id="city" name="city" 
                                       value="{{ personal_info.city or '' }}">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="state" class="form-label">State</label>
                                <input type="text" class="form-control" id="state" name="state" 
                                       value="{{ personal_info.state or '' }}">
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="form-group">
                                <label for="zip_code" class="form-label">ZIP Code</label>
                                <input type="text" class="form-control" id="zip_code" name="zip_code" 
                                       value="{{ personal_info.zip_code or '' }}">
                            </div>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="country" class="form-label">Country</label>
                        <input type="text" class="form-control" id="country" name="country" 
                               value="{{ personal_info.country or '' }}" placeholder="e.g., Canada, United States">
                    </div>
                    
                    <!-- Hidden clinic_id field -->
                    {% if clinic_id %}
                    <input type="hidden" name="clinic_id" value="{{ clinic_id }}">
                    {% endif %}
                    
                    <!-- Navigation Buttons -->
                    <div class="d-flex justify-content-between mt-4">
                        <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary">
                            <i class="fas fa-arrow-left me-2"></i>Cancel
                        </a>
                        <button type="submit" class="btn btn-primary">
                            Continue to Sleep Test Information <i class="fas fa-arrow-right ms-2"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Debug form submission
        document.querySelector('#personal-info-form').addEventListener('submit', function(e) {
            console.log('Form submission started');
            console.log('Form action:', this.action);
            console.log('Form method:', this.method);
            console.log('Event defaultPrevented:', e.defaultPrevented);
            
            // Log individual form values
            const formData = new FormData(this);
            console.log('Form data entries:');
            for (let [key, value] of formData.entries()) {
                console.log(`${key}: ${value}`);
            }
            
            // Also log individual field values
            console.log('Individual field values:');
            console.log('first_name:', document.getElementById('first_name').value);
            console.log('last_name:', document.getElementById('last_name').value);
            console.log('email:', document.getElementById('email').value);
            console.log('phone:', document.getElementById('phone').value);
            console.log('date_of_birth:', document.getElementById('date_of_birth').value);
            
            console.log('About to show alert...');
            console.log('Alert shown, form should submit now');
        });
        
        
        // Clear visual indicators when user starts typing
        document.querySelectorAll('input[required]').forEach(input => {
            input.addEventListener('input', function() {
                this.style.borderColor = '';
            });
        });
        
        // Client-side form validation
        function validateForm() {
            const requiredFields = [
                { id: 'first_name', name: 'First Name' },
                { id: 'last_name', name: 'Last Name' },
                { id: 'email', name: 'Email Address' },
                { id: 'phone', name: 'Phone Number' },
                { id: 'date_of_birth', name: 'Date of Birth' }
            ];
            
            const missingFields = [];
            
            requiredFields.forEach(field => {
                const element = document.getElementById(field.id);
                if (!element.value.trim()) {
                    missingFields.push(field.name);
                    // Add visual indication
                    element.style.borderColor = '#dc3545';
                } else {
                    // Remove visual indication
                    element.style.borderColor = '';
                }
            });
            
            if (missingFields.length > 0) {
                alert(`Please fill in the following required fields:\n• ${missingFields.join('\n• ')}`);
                return false;
            }
            
            // Validate email format
            const email = document.getElementById('email').value;
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                alert('Please enter a valid email address.');
                document.getElementById('email').style.borderColor = '#dc3545';
                return false;
            }
            
            // Validate date of birth
            const dob = document.getElementById('date_of_birth').value;
            if (dob) {
                const dobDate = new Date(dob);
                const today = new Date();
                if (dobDate >= today) {
                    alert('Date of birth must be in the past.');
                    document.getElementById('date_of_birth').style.borderColor = '#dc3545';
                    return false;
                }
            }
            
            return true;
        }
        
        // Form submission handler
        document.getElementById('personal-info-form').addEventListener('submit', function(e) {
            if (!validateForm()) {
                e.preventDefault();
                return false;
            }
        });
        
        
        // Display error message if present
        {% if error_message %}
        alert('Error: {{ error_message }}');
        {% endif %}
        
    </script>
</body>
</html>
